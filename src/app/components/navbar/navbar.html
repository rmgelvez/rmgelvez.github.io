<nav class="navbar">
  <div class="navbar__container">
    <a class="navbar__logo" (click)="scrollTo('hero')">RG</a>

    <button class="navbar__hamburger" (click)="toggleMenu()" [class.open]="menuOpen()" [attr.aria-label]="'Toggle menu'">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="navbar__links" [class.open]="menuOpen()">
      @for (section of sections; track section.id) {
        @if (section.route) {
          <li>
            <a
              class="navbar__link"
              [routerLink]="section.route"
              routerLinkActive="active"
              (click)="menuOpen.set(false)"
            >{{ getLabel(section.label) }}</a>
          </li>
        } @else {
          <li>
            <a
              class="navbar__link"
              [class.active]="activeSection() === section.id"
              (click)="scrollTo(section.id)"
            >{{ getLabel(section.label) }}</a>
          </li>
        }
      }
    </ul>

    <div class="navbar__controls">
      <button class="navbar__lang-toggle" (click)="i18n.toggleLanguage()" [attr.aria-label]="'Toggle language'">
        {{ i18n.language() === 'en' ? 'EN' : 'ES' }}
      </button>
      <button class="navbar__theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
        @if (theme() === 'dark') {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        }
      </button>
    </div>
  </div>
</nav>
