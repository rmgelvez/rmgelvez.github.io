<div class="skills">
  <h2 class="section-title">Skills</h2>

  <div class="skills__icons">
    <img [src]="skillIconsUrl" alt="Tech stack icons" loading="lazy" />
  </div>

  <div class="skills__tags">
    @for (skill of skills; track skill) {
      <span class="skills__tag">{{ skill }}</span>
    }
  </div>
</div>
